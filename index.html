<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Data Entry Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .auth-section {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 5px;
        }

        .auth-section h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }

        .auth-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #999;
        }

        .status-dot.authorized {
            background: #28a745;
        }

        .status-text {
            color: #666;
        }

        .status-text.authorized {
            color: #28a745;
            font-weight: 600;
        }

        .auth-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .auth-button:active {
            transform: translateY(0);
        }

        .auth-button.authorized {
            background: #28a745;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-button {
            width: 100%;
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .submit-button:hover:not(:disabled) {
            background: #555;
            transform: translateY(-2px);
        }

        .submit-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Excel Data Entry</h1>
        <p class="subtitle">Add data to your OneDrive Excel file</p>

        <!-- Authorization Section -->
        <div class="auth-section">
            <h2>Authorization (First Time Only)</h2>
            <div class="auth-status">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Not authorized</span>
            </div>
            <button class="auth-button" id="authorizeBtn">🔐 Authorize with Microsoft</button>
        </div>

        <!-- Form Section -->
        <form id="dataForm">
            <div class="form-group">
                <label for="code">Code *</label>
                <input type="number" id="code" name="code" placeholder="Enter code" required>
            </div>

            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" placeholder="Enter title" required>
            </div>

            <div class="form-group">
                <label for="col_g">Column G</label>
                <input type="text" id="col_g" name="col_g" placeholder="Enter value for Column G">
            </div>

            <div class="form-group">
                <label for="col_h">Column H</label>
                <input type="text" id="col_h" name="col_h" placeholder="Enter value for Column H">
            </div>

            <div class="form-group">
                <label for="col_i">Column I</label>
                <input type="text" id="col_i" name="col_i" placeholder="Enter value for Column I">
            </div>

            <div class="form-group">
                <label for="col_j">Column J</label>
                <input type="text" id="col_j" name="col_j" placeholder="Enter value for Column J">
            </div>

            <div class="form-group">
                <label for="col_k">Column K</label>
                <input type="text" id="col_k" name="col_k" placeholder="Enter value for Column K">
            </div>

            <div class="form-group">
                <label for="col_l">Column L</label>
                <input type="text" id="col_l" name="col_l" placeholder="Enter value for Column L">
            </div>

            <div class="form-group">
                <label for="col_m">Column M (Notes)</label>
                <textarea id="col_m" name="col_m" placeholder="Enter notes here"></textarea>
            </div>

            <button type="submit" class="submit-button" id="submitBtn" disabled>Submit Data</button>
        </form>

        <div class="message" id="message"></div>
    </div>

    <script>
        // ============ CONFIGURATION - UPDATE THESE VALUES ============
        const CLIENT_ID = '0af4f82e-ecee-49cd-a88f-7e8952adb8b2';  // Your CLIENT_ID
        const TENANT_ID = 'c0988961-00da-49f4-9e9b-047b936380e4';  // Your TENANT_ID
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const AZURE_FUNCTION_URL = 'YOUR-AZURE-FUNCTION-URL-HERE';  // Replace with your Function URL
        const TARGET_FILE_NAME = 'data.xlsx';  // Replace with your Excel file name

        // ============ STATE MANAGEMENT ============
        let refreshToken = null;

        // ============ INITIALIZATION ============
        document.addEventListener('DOMContentLoaded', () => {
            // Check if we're returning from authorization
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');

            if (authCode) {
                handleAuthorizationCallback(authCode);
            } else {
                // Load existing token if available
                loadStoredToken();
            }

            // Setup event listeners
            document.getElementById('authorizeBtn').addEventListener('click', startAuthorization);
            document.getElementById('dataForm').addEventListener('submit', handleFormSubmit);
        });

        // ============ AUTHORIZATION FLOW ============
        function startAuthorization() {
            const authUrl = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?` +
                `client_id=${encodeURIComponent(CLIENT_ID)}&` +
                `response_type=code&` +
                `scope=${encodeURIComponent('Files.ReadWrite.All offline_access')}&` +
                `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
                `response_mode=query`;
            
            window.location.href = authUrl;
        }

        async function handleAuthorizationCallback(authCode) {
            showMessage('Processing authorization...', 'info');
            
            try {
                const tokenResponse = await fetch(`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        code: authCode,
                        redirect_uri: REDIRECT_URI,
                        grant_type: 'authorization_code',
                        scope: 'Files.ReadWrite.All offline_access'
                    })
                });

                if (!tokenResponse.ok) {
                    throw new Error('Token exchange failed');
                }

                const tokenData = await tokenResponse.json();
                refreshToken = tokenData.refresh_token;

                if (refreshToken) {
                    localStorage.setItem('refreshToken', refreshToken);
                    updateAuthStatus(true);
                    showMessage('✓ Authorization successful!', 'success');
                    
                    // Clean up URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else {
                    throw new Error('No refresh token received');
                }
            } catch (error) {
                console.error('Authorization error:', error);
                showMessage('✗ Authorization failed: ' + error.message, 'error');
            }
        }

        function loadStoredToken() {
            refreshToken = localStorage.getItem('refreshToken');
            if (refreshToken) {
                updateAuthStatus(true);
            }
        }

        // ============ UI UPDATES ============
        function updateAuthStatus(isAuthorized) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const authorizeBtn = document.getElementById('authorizeBtn');
            const submitBtn = document.getElementById('submitBtn');

            if (isAuthorized) {
                statusDot.classList.add('authorized');
                statusText.textContent = '✓ Authorized (refresh token stored)';
                statusText.classList.add('authorized');
                authorizeBtn.classList.add('authorized');
                authorizeBtn.textContent = '✓ Already Authorized';
                submitBtn.disabled = false;
            } else {
                statusDot.classList.remove('authorized');
                statusText.textContent = 'Not authorized';
                statusText.classList.remove('authorized');
                authorizeBtn.classList.remove('authorized');
                authorizeBtn.textContent = '🔐 Authorize with Microsoft';
                submitBtn.disabled = true;
            }
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    messageEl.className = 'message';
                }, 3000);
            }
        }

        // ============ FORM SUBMISSION ============
        async function handleFormSubmit(e) {
            e.preventDefault();

            if (!refreshToken) {
                showMessage('✗ Please authorize first', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading">⌛</span> Submitting...';

            try {
                const formData = {
                    code: document.getElementById('code').value,
                    title: document.getElementById('title').value,
                    col_g: document.getElementById('col_g').value,
                    col_h: document.getElementById('col_h').value,
                    col_i: document.getElementById('col_i').value,
                    col_j: document.getElementById('col_j').value,
                    col_k: document.getElementById('col_k').value,
                    col_l: document.getElementById('col_l').value,
                    col_m: document.getElementById('col_m').value
                };

                const payload = {
                    new_row_data: formData,
                    target_file_name: TARGET_FILE_NAME,
                    refresh_token: refreshToken
                };

                const response = await fetch(AZURE_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('✓ Data submitted successfully!', 'success');
                    document.getElementById('dataForm').reset();
                } else {
                    showMessage('✗ Error: ' + result.message, 'error');
                    
                    // If token expired, clear it
                    if (response.status === 401) {
                        localStorage.removeItem('refreshToken');
                        refreshToken = null;
                        updateAuthStatus(false);
                        showMessage('✗ Token expired. Please authorize again.', 'error');
                    }
                }
            } catch (error) {
                console.error('Submission error:', error);
                showMessage('✗ Network error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Data';
            }
        }
    </script>
</body>
</html>
